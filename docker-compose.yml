version: '3.8'

services: 
  # main pipeline service 
  pipeline: 
    # build the image using Dockerfile in current directory
    build: .

    # load env variables from .env file
    env_file: 
      - .env

      # mount local folders into container 
      # format: local_path:container_path

    volumes: 
      - ./src:/app/src
      - ./data:/app/data

    # keep the continer running 
    command: tail -f /dev/null
    
